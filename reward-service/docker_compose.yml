version: "3.9"

services:

  # =========================
  # PostgreSQL
  # =========================
  postgres:
    image: postgres:15
    container_name: reward-postgres
    restart: always
    environment:
      POSTGRES_USER: reward
      POSTGRES_PASSWORD: reward
      POSTGRES_DB: reward
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # =========================
  # Zookeeper (Kafka required)
  # =========================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: reward-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  # =========================
  # Kafka
  # =========================
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: reward-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # =========================
  # Redpanda
  # =========================
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.3.5
    container_name: reward-redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "512M"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
    ports:
      - "19092:19092"
      - "9644:9644"

  # =========================
  # Reward Service
  # =========================
  reward-service:
    build: .
    container_name: reward-service
    depends_on:
      - postgres
      - kafka
      - redpanda
    environment:
      CONFIG_FILE: config.yaml
    ports:
      - "8080:8080"
    restart: always

volumes:
  postgres_data:

